<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Metadog{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/tailwind.css" />
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/chart.min.js" defer></script>
</head>
<body class="h-full">
  <div class="min-h-full">
    <!-- Navigation -->
    <nav class="bg-indigo-700">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-8">
            <a href="/" class="text-white font-bold text-xl tracking-tight">🐕 Metadog</a>
            <div class="flex gap-4">
              <a href="/" class="text-indigo-200 hover:text-white text-sm font-medium">Home</a>
              <a href="/sources" class="text-indigo-200 hover:text-white text-sm font-medium">Sources</a>
              <a href="/scans" class="text-indigo-200 hover:text-white text-sm font-medium">Scans</a>
              <a href="/anomalies" class="text-indigo-200 hover:text-white text-sm font-medium">Anomalies</a>
              <a href="/tokens" class="text-indigo-200 hover:text-white text-sm font-medium">Tokens</a>
            </div>
          </div>
          <div class="flex items-center gap-4">
            {% if org is defined %}
              <span class="text-indigo-300 text-sm">{{ org.name }}</span>
            {% endif %}
            <a href="/auth/logout" class="text-indigo-200 hover:text-white text-sm">Logout</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page content -->
    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
