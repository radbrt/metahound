services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metadog
      POSTGRES_PASSWORD: metadog
      POSTGRES_DB: metadog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadog"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://metadog:metadog@postgres:5432/metadog
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # hot-reload in dev; remove in production

volumes:
  postgres_data:
