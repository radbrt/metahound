{% extends "base.html" %}
{% block title %}Anomalies — Metahound{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Anomalies</h1>
  <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
    <input
      type="checkbox"
      hx-get="/anomalies?unacknowledged_only=true"
      hx-target="#anomaly-table-body"
      hx-swap="innerHTML"
      class="rounded border-gray-300 text-[#32a8e1]"
    />
    Open only
  </label>
</div>

<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Metric URI</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Value</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Z-score</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Detected</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
        <th class="px-6 py-3"></th>
      </tr>
    </thead>
    <tbody id="anomaly-table-body" class="bg-white divide-y divide-gray-200">
      {% if anomalies %}
        {% include "partials/anomaly_row.html" %}
      {% else %}
      <tr>
        <td colspan="6" class="px-6 py-8 text-center text-sm text-gray-400">No anomalies found.</td>
      </tr>
      {% endif %}
    </tbody>
  </table>
</div>
{% endblock %}
